<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Pulse — AI-Assisted Status Reports, Risk Registers &amp; Vendor Tracking</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --ink: #0E0E12;
    --panel: #17171D;
    --panel-raised: #1E1E26;
    --violet: #9B8FE8;
    --violet-dim: #6A619E;
    --violet-bright: #B3A9F5;
    --gold: #C9A24D;
    --coral: #E08579;
    --paper: #F2F1F6;
    --text-dim: #8A8894;
    --text-faint: #56545F;
    --line: #2A2A34;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  .shell {
    max-width: 1180px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid var(--violet-dim);
    padding-bottom: 20px;
    margin-bottom: 36px;
  }

  .brand-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--violet);
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 32px;
    margin: 0;
    color: var(--paper);
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-dim);
    max-width: 420px;
    text-align: right;
    line-height: 1.5;
  }

  .layout {
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 28px;
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 24px;
  }

  .panel h2 {
    font-family: 'Source Serif 4', serif;
    font-size: 18px;
    margin: 0 0 4px;
    color: var(--paper);
  }

  .panel .hint {
    font-size: 12.5px;
    color: var(--text-dim);
    margin: 0 0 16px;
    line-height: 1.5;
  }

  textarea {
    width: 100%;
    min-height: 320px;
    resize: vertical;
    border: 1px solid var(--line);
    background: var(--ink);
    padding: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    color: var(--paper);
    border-radius: 2px;
  }

  textarea::placeholder { color: var(--text-faint); }

  textarea:focus {
    outline: 2px solid var(--violet);
    outline-offset: 1px;
  }

  .sample-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--violet);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    padding: 6px 10px;
    border-radius: 2px;
    cursor: pointer;
    margin-top: 10px;
  }
  .sample-btn:hover { border-color: var(--violet); }

  .key-field {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
  }
  .key-field label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--violet);
    margin-bottom: 6px;
  }
  .key-field input {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--ink);
    padding: 10px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    border-radius: 2px;
    color: var(--paper);
  }
  .key-field input:focus {
    outline: 2px solid var(--violet);
    outline-offset: 1px;
  }
  .key-hint {
    font-size: 11.5px;
    color: var(--text-faint);
    margin: 6px 0 0;
    line-height: 1.5;
  }
  .key-hint .mono {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
  }

  .generate-btn {
    width: 100%;
    margin-top: 16px;
    background: var(--violet);
    color: var(--ink);
    border: none;
    padding: 14px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 2px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: background 0.15s ease;
  }
  .generate-btn:hover:not(:disabled) { background: var(--violet-bright); }
  .generate-btn:disabled { background: var(--text-faint); color: var(--text-dim); cursor: not-allowed; }

  .tabs-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 1px solid var(--line);
  }

  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-bottom: 0;
  }

  .export-bar {
    display: flex;
    gap: 8px;
    padding-bottom: 6px;
  }

  .export-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--violet-bright);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 7px 12px;
    border-radius: 2px;
    cursor: pointer;
    white-space: nowrap;
  }
  .export-btn:hover:not(:disabled) { border-color: var(--violet); }
  .export-btn:disabled { color: var(--text-faint); cursor: not-allowed; }

  .checklist-phase h4 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--violet);
    margin: 22px 0 8px;
  }
  .checklist-phase:first-child h4 { margin-top: 0; }

  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .checklist-item input[type="checkbox"] {
    margin-top: 3px;
    accent-color: var(--violet);
    cursor: pointer;
  }
  .checklist-item label { cursor: pointer; flex: 1; }
  .checklist-item.done label { color: var(--text-faint); text-decoration: line-through; }
  .checklist-item .owner-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    white-space: nowrap;
  }

  .tab {
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    font-family: 'IBM Plex Mono', monospace;
  }

  .tab.active {
    color: var(--violet-bright);
    border-bottom-color: var(--violet);
  }

  .output-body {
    padding: 26px 4px 6px;
    min-height: 420px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    color: var(--text-dim);
    text-align: center;
    padding: 20px;
  }

  .empty-state .glyph {
    font-family: 'Source Serif 4', serif;
    font-size: 40px;
    color: var(--violet-dim);
    margin-bottom: 12px;
  }

  .empty-state p { font-size: 13.5px; max-width: 280px; margin: 4px 0; }

  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    color: var(--violet);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  .dot-pulse {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .dot-pulse span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--violet);
    animation: pulse 1.2s infinite ease-in-out;
  }
  .dot-pulse span:nth-child(2) { animation-delay: 0.15s; }
  .dot-pulse span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  table.report-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.report-table th {
    text-align: left;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--violet);
    border-bottom: 1.5px solid var(--violet-dim);
    padding: 8px 10px;
  }
  table.report-table td {
    padding: 10px 10px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
    line-height: 1.5;
    color: var(--paper);
  }
  .risk-high { color: var(--coral); font-weight: 600; }
  .risk-med { color: var(--gold); font-weight: 600; }
  .risk-low { color: var(--violet); font-weight: 600; }

  .status-narrative {
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--paper);
  }
  .status-narrative h3 {
    font-family: 'Source Serif 4', serif;
    font-size: 15.5px;
    color: var(--violet-bright);
    margin: 22px 0 8px;
  }
  .status-narrative h3:first-child { margin-top: 0; }

  .doc-stamp {
    margin-top: 28px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    display: flex;
    justify-content: space-between;
  }

  .error-box {
    background: rgba(224, 133, 121, 0.12);
    border: 1px solid var(--coral);
    color: var(--coral);
    padding: 14px;
    font-size: 13px;
    border-radius: 2px;
    margin-top: 12px;
  }

  footer.credit {
    margin-top: 48px;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
  }
</style>
</head>
<body>
<div id="root">
  <div style="max-width:600px;margin:60px auto;padding:24px;font-family:sans-serif;color:#8A8894;font-size:14px;line-height:1.6;" id="fallback-msg">
    Loading… if this message doesn't disappear in a few seconds, check the browser console (F12 → Console) for an error, or try opening this file over a local server rather than directly (file://) — some browsers block script loading on local files.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" onerror="document.getElementById('fallback-msg').innerHTML='<strong style=color:#E08579>Could not load React from the CDN.</strong><br>Check your internet connection, or that your browser/network isn\'t blocking cdn.jsdelivr.net.'"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState } = React;

const SAMPLE_NOTES = `Project: Website relaunch, three-market rollout
Owner: me, coordinating with regional leads in three markets

Update from this week:
- Main hosting/infrastructure setup confirmed for launch market 1, but the development agency hasn't returned the signed statement of work yet, been chasing for 5 days
- Content drafts for 2 of 4 landing pages still not submitted, deadline was yesterday, review will be tight before go-live
- Legal flagged the vendor contract terms need re-review after a policy update last week - could delay sign-off by around 2 weeks
- Market B budget is currently running 8% over what was approved, need sign-off from finance
- Data capture / consent forms for the sign-up flow still use an old template, compliance asked us to update before launch
- Market C lead asked about adding an extra market to scope, not currently budgeted
- Overall timeline: on track for the first launch date, second market launch is at risk pending budget approval
- External partners involved: development agency (build and hosting), design agency (content and creative review)
- The design agency has been slow on turnaround this month, two deliverables came in late`;

function escapeHtml(str) {
  return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function severityColor(sev) {
  return sev === 'High' ? '#B3261E' : sev === 'Medium' ? '#8A6D00' : '#3A6B35';
}

function buildReportHTML(results, timestamp) {
  const e = escapeHtml;

  const statusHtml = `
    <h2>Status Report</h2>
    <p style="font-style:italic;color:#444;">${e(results.status.summary)}</p>
    ${results.status.sections.map(s => `<h3>${e(s.heading)}</h3><p>${e(s.body)}</p>`).join('')}
  `;

  const risksHtml = `
    <h2>Risk Register</h2>
    <table>
      <thead><tr><th>Risk</th><th>Severity</th><th>Mitigation</th><th>Owner</th></tr></thead>
      <tbody>
        ${results.risks.map(r => `<tr><td><strong>${e(r.risk)}</strong><br><span style="color:#555;">${e(r.description)}</span></td><td style="color:${severityColor(r.severity)};font-weight:600;">${e(r.severity)}</td><td>${e(r.mitigation)}</td><td>${e(r.owner)}</td></tr>`).join('')}
      </tbody>
    </table>
  `;

  const agenciesHtml = `
    <h2>Agency / Vendor Tracker</h2>
    <table>
      <thead><tr><th>Agency / Vendor</th><th>Scope</th><th>Status</th><th>Flag</th></tr></thead>
      <tbody>
        ${results.agencies.map(a => `<tr><td><strong>${e(a.agency)}</strong></td><td>${e(a.scope)}</td><td>${e(a.status)}</td><td>${e(a.flag || '—')}</td></tr>`).join('')}
      </tbody>
    </table>
  `;

  const commsHtml = `
    <h2>Stakeholder Communications Plan</h2>
    <table>
      <thead><tr><th>Stakeholder</th><th>Interest</th><th>Key Message</th><th>Channel</th><th>Cadence</th><th>Owner</th></tr></thead>
      <tbody>
        ${results.commsPlan.map(c => `<tr><td><strong>${e(c.stakeholder)}</strong></td><td>${e(c.interest)}</td><td>${e(c.keyMessage)}</td><td>${e(c.channel)}</td><td>${e(c.cadence)}</td><td>${e(c.owner)}</td></tr>`).join('')}
      </tbody>
    </table>
  `;

  const phases = [...new Set(results.changeChecklist.map(i => i.phase))];
  const checklistHtml = `
    <h2>Change Management Checklist</h2>
    ${phases.map(phase => `
      <h3>${e(phase)}</h3>
      <ul style="list-style:none;padding-left:0;">
        ${results.changeChecklist.filter(i => i.phase === phase).map(i => `<li style="margin:6px 0;">&#9744; ${e(i.item)} <span style="color:#666;">(${e(i.owner)})</span></li>`).join('')}
      </ul>
    `).join('')}
  `;

  return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Project Pulse Report</title>
<style>
  body { font-family: Georgia, 'Times New Roman', serif; color:#111; max-width:800px; margin:40px auto; padding:0 20px; line-height:1.5; }
  h1 { font-size:22px; border-bottom:2px solid #333; padding-bottom:8px; }
  h2 { font-size:17px; margin-top:32px; border-bottom:1px solid #ccc; padding-bottom:4px; }
  h3 { font-size:14px; margin-top:18px; color:#333; }
  table { width:100%; border-collapse:collapse; font-size:12.5px; margin-top:8px; }
  th, td { border:1px solid #ccc; padding:6px 8px; text-align:left; vertical-align:top; }
  th { background:#f2f2f2; font-size:11px; text-transform:uppercase; letter-spacing:0.03em; }
  .meta { font-size:11px; color:#666; margin-bottom:24px; }
  @media print { body { margin:0; padding:20px; } }
</style>
</head>
<body>
  <h1>Project Pulse — Status Report</h1>
  <div class="meta">Generated ${e(timestamp)} &middot; Draft for review, not for direct circulation without sign-off.</div>
  ${statusHtml}
  ${risksHtml}
  ${agenciesHtml}
  ${commsHtml}
  ${checklistHtml}
</body></html>`;
}

function App() {
  const [notes, setNotes] = useState('');
  const [apiKey, setApiKey] = useState('');
  const [showKeyInput, setShowKeyInput] = useState(false);
  const [activeTab, setActiveTab] = useState('status');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [results, setResults] = useState(null);
  const [checkedItems, setCheckedItems] = useState({});

  const loadSample = () => setNotes(SAMPLE_NOTES);

  const toggleChecked = (idx) => {
    setCheckedItems(prev => ({ ...prev, [idx]: !prev[idx] }));
  };

  const generate = async () => {
    if (!notes.trim()) return;
    if (!apiKey.trim()) {
      setShowKeyInput(true);
      setError("Add your Anthropic API key below to run this — it's used only in your browser and never stored or sent anywhere else.");
      return;
    }
    setLoading(true);
    setError(null);
    setResults(null);

    const systemPrompt = `You are a project management assistant. You take rough, informal project notes from a project manager and convert them into five structured outputs. You must respond ONLY with a single valid JSON object, no markdown fences, no preamble, matching exactly this shape:

{
  "status": {
    "summary": "2-3 sentence executive summary of overall project health",
    "sections": [
      {"heading": "string, e.g. 'Progress This Period'", "body": "string, plain prose, 2-5 sentences"}
    ]
  },
  "risks": [
    {"risk": "string, short risk title", "description": "string, 1-2 sentences", "severity": "High" | "Medium" | "Low", "mitigation": "string, 1 sentence suggested mitigation", "owner": "string, best guess at owner or 'TBC'"}
  ],
  "agencies": [
    {"agency": "string, agency/vendor/partner name", "scope": "string, what they are responsible for", "status": "string, current delivery status", "flag": "string or empty, any compliance/performance concern"}
  ],
  "commsPlan": [
    {"stakeholder": "string, stakeholder or stakeholder group named or implied in the notes (e.g. 'Regional lead - Market B', 'Finance', 'Legal', 'Development agency')", "interest": "string, 1 sentence on what they care about or why they need an update", "keyMessage": "string, 1 sentence, the specific thing they should be told given current status", "channel": "string, e.g. 'Email', 'Steering committee', 'Slack update', '1:1 call'", "cadence": "string, e.g. 'Weekly', 'Ad hoc', 'At milestone'", "owner": "string, best guess at who sends this update, or 'TBC'"}
  ],
  "changeChecklist": [
    {"phase": "Prepare" | "Communicate" | "Train & Enable" | "Execute" | "Monitor & Sustain", "item": "string, a specific, actionable checklist item for this rollout", "owner": "string, best guess or 'TBC'"}
  ]
}

Extract only what is grounded in the notes provided. Do not invent details, names, or figures that are not implied by the notes. Use a professional, neutral project management register suitable for a stakeholder-facing status dashboard. Keep language precise and non-alarmist even for high risks.

For "commsPlan": base entries on stakeholders, teams, or vendors actually named or clearly implied in the notes (regional leads, finance, legal, external agencies, sponsors, etc.) — do not invent stakeholders that aren't implied. Produce 3-6 entries.

For "changeChecklist": generate a rollout change-management checklist covering the five standard phases (Prepare, Communicate, Train & Enable, Execute, Monitor & Sustain), 2-4 items per phase. Combine standard change-management best practice for a rollout of this kind with anything specific the notes imply (e.g. an outstanding vendor SOW, a compliance template update, a budget sign-off). It is acceptable to include generally-applicable best-practice items even if not explicitly stated in the notes, since this is a planning checklist rather than a status extraction — but do not invent specific names, figures, or claims about this project that aren't implied.`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-5",
          max_tokens: 2400,
          system: systemPrompt,
          messages: [
            { role: "user", content: `Project notes:\n\n${notes}` }
          ],
        })
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API error (${response.status}): ${errText.slice(0, 200)}`);
      }

      const data = await response.json();
      const textBlock = (data.content || []).find(b => b.type === "text");
      if (!textBlock) throw new Error("No response content returned.");

      let clean = textBlock.text.trim().replace(/^```json\s*/i, '').replace(/```$/,'').trim();
      const parsed = JSON.parse(clean);
      setResults(parsed);
      setCheckedItems({});
    } catch (e) {
      console.error(e);
      setError(e.message || "Could not generate the report. Please check your API key and try again.");
    } finally {
      setLoading(false);
    }
  };

  const timestamp = new Date().toISOString().replace('T', ' ').slice(0, 16) + ' UTC';

  const exportPDF = () => {
    if (!results) return;
    const html = buildReportHTML(results, timestamp);
    const win = window.open('', '_blank');
    if (!win) {
      setError('Pop-up blocked — allow pop-ups for this page to export a PDF.');
      return;
    }
    win.document.open();
    win.document.write(html);
    win.document.close();
    win.onload = () => { win.focus(); win.print(); };
  };

  const exportWord = () => {
    if (!results) return;
    const html = buildReportHTML(results, timestamp);
    const wordHtml = html.replace(
      '<html>',
      '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">'
    );
    const blob = new Blob(['﻿', wordHtml], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `project-pulse-report-${new Date().toISOString().slice(0, 10)}.doc`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return (
    <div className="shell">
      <header className="top">
        <div>
          <div className="brand-eyebrow">Project Management · Reporting</div>
          <h1>Project Pulse</h1>
        </div>
        <div className="subtitle">Turns rough project notes into a status report, risk register, vendor tracker, stakeholder comms plan, and change-management checklist — exportable as PDF or Word, drafted for review, not for direct submission.</div>
      </header>

      <div className="layout">
        <div className="panel">
          <h2>Project notes</h2>
          <p className="hint">Paste raw notes: what's happened, what's blocked, budget or timeline concerns, external vendors or partners involved. Informal is fine — bullet points, half-sentences, whatever you have.</p>
          <textarea
            value={notes}
            onChange={e => setNotes(e.target.value)}
            placeholder="e.g. Launch date confirmed, vendor contract still not signed, two deliverables running late..."
          />
          <button className="sample-btn" onClick={loadSample}>Load sample notes</button>

          <div className="key-field">
            <label htmlFor="api-key">Anthropic API key</label>
            <input
              id="api-key"
              type="password"
              value={apiKey}
              onChange={e => setApiKey(e.target.value)}
              placeholder="sk-ant-..."
              autoComplete="off"
            />
            <p className="key-hint">Stays in your browser for this session only — never sent anywhere but api.anthropic.com. Get a key at <span className="mono">console.anthropic.com</span>.</p>
          </div>

          <button className="generate-btn" onClick={generate} disabled={loading || !notes.trim()}>
            {loading ? 'Generating…' : 'Generate report'}
          </button>
          {error && <div className="error-box">{error}</div>}
        </div>

        <div className="panel">
          <div className="tabs-row">
            <div className="tabs">
              <div className={`tab ${activeTab === 'status' ? 'active' : ''}`} onClick={() => setActiveTab('status')}>Status Report</div>
              <div className={`tab ${activeTab === 'risks' ? 'active' : ''}`} onClick={() => setActiveTab('risks')}>Risk Register</div>
              <div className={`tab ${activeTab === 'agencies' ? 'active' : ''}`} onClick={() => setActiveTab('agencies')}>Agency Tracker</div>
              <div className={`tab ${activeTab === 'comms' ? 'active' : ''}`} onClick={() => setActiveTab('comms')}>Comms Plan</div>
              <div className={`tab ${activeTab === 'checklist' ? 'active' : ''}`} onClick={() => setActiveTab('checklist')}>Change Checklist</div>
            </div>
            <div className="export-bar">
              <button className="export-btn" onClick={exportPDF} disabled={!results}>Export PDF</button>
              <button className="export-btn" onClick={exportWord} disabled={!results}>Export Word (.doc)</button>
            </div>
          </div>

          <div className="output-body">
            {loading && (
              <div className="loading-state">
                <div className="dot-pulse"><span></span><span></span><span></span></div>
                Structuring your notes…
              </div>
            )}

            {!loading && !results && (
              <div className="empty-state">
                <div className="glyph">§</div>
                <p>Paste your notes and generate a report to see the status summary, risk register, agency tracker, comms plan, and change checklist here.</p>
              </div>
            )}

            {!loading && results && activeTab === 'status' && (
              <div className="status-narrative">
                <p style={{fontStyle: 'italic', color: 'var(--text-dim)'}}>{results.status.summary}</p>
                {results.status.sections.map((s, i) => (
                  <div key={i}>
                    <h3>{s.heading}</h3>
                    <p>{s.body}</p>
                  </div>
                ))}
                <div className="doc-stamp">
                  <span>STATUS REPORT · DRAFT FOR REVIEW</span>
                  <span>{timestamp}</span>
                </div>
              </div>
            )}

            {!loading && results && activeTab === 'risks' && (
              <div>
                <table className="report-table">
                  <thead>
                    <tr><th>Risk</th><th>Severity</th><th>Mitigation</th><th>Owner</th></tr>
                  </thead>
                  <tbody>
                    {results.risks.map((r, i) => (
                      <tr key={i}>
                        <td><strong>{r.risk}</strong><br/><span style={{color:'var(--text-dim)'}}>{r.description}</span></td>
                        <td className={r.severity === 'High' ? 'risk-high' : r.severity === 'Medium' ? 'risk-med' : 'risk-low'}>{r.severity}</td>
                        <td>{r.mitigation}</td>
                        <td>{r.owner}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="doc-stamp">
                  <span>RISK REGISTER · DRAFT FOR REVIEW</span>
                  <span>{timestamp}</span>
                </div>
              </div>
            )}

            {!loading && results && activeTab === 'agencies' && (
              <div>
                <table className="report-table">
                  <thead>
                    <tr><th>Agency / Vendor</th><th>Scope</th><th>Status</th><th>Flag</th></tr>
                  </thead>
                  <tbody>
                    {results.agencies.map((a, i) => (
                      <tr key={i}>
                        <td><strong>{a.agency}</strong></td>
                        <td>{a.scope}</td>
                        <td>{a.status}</td>
                        <td style={{color: a.flag ? 'var(--coral)' : 'var(--text-faint)'}}>{a.flag || '—'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="doc-stamp">
                  <span>AGENCY TRACKER · DRAFT FOR REVIEW</span>
                  <span>{timestamp}</span>
                </div>
              </div>
            )}

            {!loading && results && activeTab === 'comms' && (
              <div>
                <table className="report-table">
                  <thead>
                    <tr><th>Stakeholder</th><th>Interest</th><th>Key Message</th><th>Channel</th><th>Cadence</th><th>Owner</th></tr>
                  </thead>
                  <tbody>
                    {results.commsPlan.map((c, i) => (
                      <tr key={i}>
                        <td><strong>{c.stakeholder}</strong></td>
                        <td>{c.interest}</td>
                        <td>{c.keyMessage}</td>
                        <td>{c.channel}</td>
                        <td>{c.cadence}</td>
                        <td>{c.owner}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="doc-stamp">
                  <span>STAKEHOLDER COMMS PLAN · DRAFT FOR REVIEW</span>
                  <span>{timestamp}</span>
                </div>
              </div>
            )}

            {!loading && results && activeTab === 'checklist' && (
              <div>
                {[...new Set(results.changeChecklist.map(i => i.phase))].map(phase => (
                  <div className="checklist-phase" key={phase}>
                    <h4>{phase}</h4>
                    {results.changeChecklist
                      .map((item, idx) => ({ ...item, idx }))
                      .filter(item => item.phase === phase)
                      .map(item => (
                        <div className={`checklist-item ${checkedItems[item.idx] ? 'done' : ''}`} key={item.idx}>
                          <input
                            type="checkbox"
                            id={`check-${item.idx}`}
                            checked={!!checkedItems[item.idx]}
                            onChange={() => toggleChecked(item.idx)}
                          />
                          <label htmlFor={`check-${item.idx}`}>{item.item}</label>
                          <span className="owner-tag">{item.owner}</span>
                        </div>
                      ))}
                  </div>
                ))}
                <div className="doc-stamp">
                  <span>CHANGE MANAGEMENT CHECKLIST · DRAFT FOR REVIEW</span>
                  <span>{timestamp}</span>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      <footer className="credit">project-pulse — AI-assisted drafting only. All outputs require review before circulation.</footer>
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch (e) {
  document.getElementById('root').innerHTML =
    '<div style="max-width:600px;margin:60px auto;padding:24px;font-family:sans-serif;color:#E08579;font-size:14px;line-height:1.6;">' +
    '<strong>Something went wrong rendering the app.</strong><br>' + e.message +
    '</div>';
  console.error(e);
}
</script>
</body>
</html>
